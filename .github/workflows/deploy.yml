name: Deploy to cPanel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Test FTP connectivity
        run: |
          echo "Testing DNS resolution..."
          nslookup ${{ secrets.FTP_SERVER }} || echo "DNS FAILED"
          echo "Testing port 21..."
          nc -zv ${{ secrets.FTP_SERVER }} 21 -w 5 || echo "PORT 21 UNREACHABLE"
          echo "Testing port 990..."
          nc -zv ${{ secrets.FTP_SERVER }} 990 -w 5 || echo "PORT 990 UNREACHABLE"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          protocol: ftps
          port: 21